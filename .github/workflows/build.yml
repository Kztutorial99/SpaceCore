name: 🔨 Build SpaceCore APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.flavor }}-${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [D32, D64]
        build_type: [debug, release]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Accept SDK Licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > "$ANDROID_HOME/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n33b6937684c63cd0a3b5f4952623ebf3cc166fa7" \
            > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          echo "✅ Licenses accepted"

      - name: 📦 Install SDK 31 + Build-Tools 31.0.0
        run: |
          if [ -n "$JAVA_HOME_17_X64" ]; then export JAVA_HOME="$JAVA_HOME_17_X64"; fi
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-31" "build-tools;31.0.0" "platform-tools" \
            2>&1 | grep -vE "^\[=|^Downloading|^Unzip" || true
          echo "✅ SDK 31 ready"

      - name: 🔧 Gradle Permission
        run: chmod +x gradlew

      - name: 🏗️ Build ${{ matrix.flavor }}-${{ matrix.build_type }}
        run: |
          TYPE="${{ matrix.build_type }}"
          TYPE_CAP="$(echo ${TYPE:0:1} | tr a-z A-Z)${TYPE:1}"
          TASK="assemble${{ matrix.flavor }}${TYPE_CAP}"
          echo "▶ Task: $TASK"
          ./gradlew $TASK --no-daemon --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}

      - name: 📊 APK Info
        if: success()
        run: |
          find app/build/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            echo "📦 $(basename $f) [$(du -sh $f | cut -f1)]"
          done

      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SpaceCore-${{ matrix.flavor }}-${{ matrix.build_type }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: ✅ SUCCESS
        if: success()
        run: echo "🟢 SUCCESS — SpaceCore ${{ matrix.flavor }}-${{ matrix.build_type }}"

      - name: ❌ FAILED
        if: failure()
        run: echo "🔴 FAILED — SpaceCore ${{ matrix.flavor }}-${{ matrix.build_type }}"

  report:
    name: 📊 Build Report
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: 📋 Final Summary
        run: |
          echo "============================================"
          echo "  SPACECORE BUILD REPORT"
          echo "============================================"
          echo "Repo    : ${{ github.repository }}"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Time    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Result  : ${{ needs.build.result }}"
          echo "============================================"
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "🟢 ALL 4 BUILDS PASSED — Download APKs in Artifacts!"
          elif [ "${{ needs.build.result }}" = "failure" ]; then
            echo "🔴 BUILD FAILED — Check job logs above"
          else
            echo "🟡 STATUS: ${{ needs.build.result }}"
          fi
