name: 🔨 Build SpaceCore APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build:
    name: Build SpaceCore (${{ matrix.flavor }} - ${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [D32, D64]
        build_type: [debug, release]

    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: 🔍 Check Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms yet"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools yet"

      - name: 📦 Install Required SDK Components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-31" \
            "build-tools;30.0.3" \
            "platform-tools" \
            --verbose 2>&1 | tail -5

      - name: 📋 Grant Gradle Execute Permission
        run: chmod +x gradlew

      - name: 🔑 Verify Signing Key
        run: |
          if [ -f "meta.jks" ]; then
            echo "✅ Signing key found: meta.jks"
            keytool -list -keystore meta.jks -storepass metameta 2>/dev/null | head -5 || true
          else
            echo "❌ Signing key not found!"
            exit 1
          fi

      - name: 🏗️ Build ${{ matrix.flavor }} ${{ matrix.build_type }} APK
        run: |
          FLAVOR="${{ matrix.flavor }}"
          TYPE="${{ matrix.build_type }}"
          # Capitalize first letter of build type
          TYPE_CAP="$(echo ${TYPE:0:1} | tr '[:lower:]' '[:upper:]')${TYPE:1}"
          TASK="assemble${FLAVOR}${TYPE_CAP}"
          echo "▶ Running: ./gradlew $TASK"
          ./gradlew $TASK \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dandroid.useAndroidX=true
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: 📊 Show APK Info
        if: success()
        run: |
          echo "=== Built APKs ==="
          find app/build/outputs/apk -name "*.apk" 2>/dev/null | while read apk; do
            size=$(du -sh "$apk" | cut -f1)
            echo "📦 $(basename $apk)  [$size]  →  $apk"
          done

      - name: 📤 Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SpaceCore-${{ matrix.flavor }}-${{ matrix.build_type }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: ✅ Build Success
        if: success()
        run: |
          echo "✅ =================================="
          echo "   BUILD SUCCESS"
          echo "   Flavor  : ${{ matrix.flavor }}"
          echo "   Type    : ${{ matrix.build_type }}"
          echo "   Branch  : ${{ github.ref_name }}"
          echo "   Commit  : ${{ github.sha }}"
          echo "✅ =================================="

      - name: ❌ Build Failed
        if: failure()
        run: |
          echo "❌ =================================="
          echo "   BUILD FAILED"
          echo "   Flavor  : ${{ matrix.flavor }}"
          echo "   Type    : ${{ matrix.build_type }}"
          echo "   Branch  : ${{ github.ref_name }}"
          echo "   Commit  : ${{ github.sha }}"
          echo "❌ =================================="

  status-report:
    name: 📊 Build Status Report
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: 📋 Final Status
        run: |
          echo "========================================"
          echo "    SPACECORE BUILD STATUS REPORT"
          echo "========================================"
          echo "Repo    : ${{ github.repository }}"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Trigger : ${{ github.event_name }}"
          echo "Time    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Result  : ${{ needs.build.result }}"
          echo "========================================"
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "🟢 ALL BUILDS PASSED — Download APK from Artifacts!"
          elif [ "${{ needs.build.result }}" = "failure" ]; then
            echo "🔴 SOME BUILDS FAILED — Check job logs above!"
            exit 1
          else
            echo "🟡 STATUS: ${{ needs.build.result }}"
          fi
