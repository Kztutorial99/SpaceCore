name: 🔨 Build SpaceCore APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.flavor }}-${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [D32, D64]
        build_type: [debug, release]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Accept SDK Licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee"  > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$ANDROID_HOME/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd"  > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          echo "33b6937684c63cd0a3b5f4952623ebf3cc166fa7" >> "$ANDROID_HOME/licenses/android-sdk-preview-license"
          echo "601085b94cd77f0b54ff86406957099ebe79c4d6"  > "$ANDROID_HOME/licenses/intel-android-extra-license"
          echo "✅ Licenses accepted"
          ls -la "$ANDROID_HOME/licenses/"

      - name: 📦 Install SDK Components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-31" \
            "build-tools;30.0.3" \
            "platform-tools" 2>&1 | tail -5
          echo "✅ SDK ready"

      - name: 🔧 Gradle Permission
        run: chmod +x gradlew

      - name: 🏗️ Build ${{ matrix.flavor }} ${{ matrix.build_type }}
        run: |
          TYPE="${{ matrix.build_type }}"
          TYPE_CAP="$(echo ${TYPE:0:1} | tr a-z A-Z)${TYPE:1}"
          echo "▶ Task: assemble${{ matrix.flavor }}${TYPE_CAP}"
          ./gradlew assemble${{ matrix.flavor }}${TYPE_CAP} \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: 📊 APK Info
        if: success()
        run: |
          find app/build/outputs/apk -name "*.apk" | while read f; do
            echo "📦 $(basename $f) — $(du -sh $f | cut -f1)"
          done

      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SpaceCore-${{ matrix.flavor }}-${{ matrix.build_type }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: ✅ Success
        if: success()
        run: echo "🟢 BUILD SUCCESS — ${{ matrix.flavor }} ${{ matrix.build_type }}"

      - name: ❌ Failed
        if: failure()
        run: echo "🔴 BUILD FAILED — ${{ matrix.flavor }} ${{ matrix.build_type }}"

  report:
    name: 📊 Status Report
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: 📋 Summary
        run: |
          echo "==============================="
          echo "  SPACECORE BUILD REPORT"
          echo "==============================="
          echo "Repo   : ${{ github.repository }}"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "Time   : $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Result : ${{ needs.build.result }}"
          echo "==============================="
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "🟢 ALL BUILDS PASSED — APKs in Artifacts tab!"
          elif [ "${{ needs.build.result }}" = "failure" ]; then
            echo "🔴 BUILD FAILED — check logs above"
            exit 1
          else
            echo "🟡 STATUS: ${{ needs.build.result }}"
          fi
