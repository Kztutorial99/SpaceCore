name: 🔨 Build SpaceCore APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build:
    name: Build SpaceCore (${{ matrix.flavor }} - ${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [D32, D64]
        build_type: [debug, release]

    steps:
      - name: 📥 Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📋 Grant Gradle Execute Permission
        run: chmod +x gradlew

      - name: 🔑 Verify Signing Key
        run: |
          if [ -f "meta.jks" ]; then
            echo "✅ Signing key found: meta.jks"
            keytool -list -v -keystore meta.jks -storepass metameta 2>/dev/null | grep -E "Alias|Valid|Owner" || true
          else
            echo "❌ Signing key not found!"
            exit 1
          fi

      - name: 📦 Build ${{ matrix.flavor }} ${{ matrix.build_type }} APK
        run: |
          ./gradlew assemble${{ matrix.flavor }}$(echo ${{ matrix.build_type }} | sed 's/./\u&/') \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: 📊 Show APK Info
        if: success()
        run: |
          echo "=== Built APKs ==="
          find app/build/outputs/apk -name "*.apk" | while read apk; do
            size=$(du -sh "$apk" | cut -f1)
            echo "📦 $apk ($size)"
          done

      - name: 📤 Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SpaceCore-${{ matrix.flavor }}-${{ matrix.build_type }}-APK
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: ✅ Build Success Notification
        if: success()
        run: |
          echo "🎉 BUILD SUCCESS!"
          echo "Flavor  : ${{ matrix.flavor }}"
          echo "Type    : ${{ matrix.build_type }}"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"

      - name: ❌ Build Failed Notification
        if: failure()
        run: |
          echo "💥 BUILD FAILED!"
          echo "Flavor  : ${{ matrix.flavor }}"
          echo "Type    : ${{ matrix.build_type }}"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"

  status-report:
    name: 📊 Build Status Report
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: 📋 Report All Build Results
        run: |
          echo "========================================"
          echo "  SPACECORE BUILD STATUS REPORT"
          echo "========================================"
          echo "Result  : ${{ needs.build.result }}"
          echo "Repo    : ${{ github.repository }}"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Trigger : ${{ github.event_name }}"
          echo "Time    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "========================================"
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "🟢 ALL BUILDS PASSED — APKs ready to download!"
          elif [ "${{ needs.build.result }}" == "failure" ]; then
            echo "🔴 SOME BUILDS FAILED — Check logs above!"
          else
            echo "🟡 BUILD STATUS: ${{ needs.build.result }}"
          fi
